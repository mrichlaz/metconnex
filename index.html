    .drag-handle { cursor: grab; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      .pg { padding: 1rem; }

<body>
  <div class="pg">
    <div class="mh">
      <div class="mh-copy">
        <span class="mh-kicker">Live program builder</span>
        <div>
          <h1>MetConnex 2026</h1>
          <p>MinE AiDiC Technical Workshop · Speaker Program</p>
        </div>
      </div>
      <div class="mh-r">JICC Jakarta<br>12–13 May 2026</div>
    </div>
    <div class="legend" aria-label="Schedule controls and legend">
      <div class="legend-group">
        <div class="leg"><span class="leg-dot" style="background:var(--status-confirmed-bg); border:1px solid var(--status-confirmed-border)"></span>confirmed</div>
        <div class="leg"><span class="leg-dot" style="background:var(--status-unconfirmed-bg); border:1px solid var(--status-unconfirmed-border)"></span>unconfirmed</div>
        <div class="leg"><span class="leg-dot" style="border:1px dashed #94a3b8"></span>open slot</div>
        <div class="leg"><span class="leg-dot" style="background:#f1f5f9; border:1px solid #cbd5e1"></span>break / sponsor</div>
      </div>
      <div class="legend-meta">
        <span id="sync-status" class="status-pill" role="status" aria-live="polite">Initializing...</span>
        <span class="help-copy">Drag handles to reorder · click text to edit · use badges to update confirmation</span>
        <button type="button" class="toolbar-btn" onclick="exportSchedule(event)" aria-label="Export schedule as PNG">Export PNG</button>
      </div>
    </div>
    <div id="app"></div>
  </div>

  <script>
    const CONFIG = {
      USE_CLOUD: true,
      BIN_ID: '69dd950faaba882197f74476',
      API_KEY: '$2a$10$463txcz/Vf.xp73eqBV9MuLcKcrLcDMl5UKk5JsS9Y/OpTj10PJVm',
      BIN_API_BASE: 'https://api.jsonbin.io/v3/b'
    };

    const BIN_QUERY_PARAM = 'bin';
    let saveTimer = null;

    function getBinId(){
      const url = new URL(window.location.href);
      return (url.searchParams.get(BIN_QUERY_PARAM) || CONFIG.BIN_ID || '').trim();
    }

    function setBinId(binId){
      if(!binId) return;
      const url = new URL(window.location.href);
      url.searchParams.set(BIN_QUERY_PARAM, binId);
      window.history.replaceState({}, '', url.toString());
    }

    function scheduleSave(){
      clearTimeout(saveTimer);
      saveTimer = setTimeout(()=>saveData(), 250);
    }

    function authHeaders(contentType=true){
      const headers = {};
      if(contentType) headers['Content-Type'] = 'application/json';
      if(CONFIG.API_KEY){
        headers['X-Master-Key'] = CONFIG.API_KEY;
        headers['X-Access-Key'] = CONFIG.API_KEY;
      }
      return headers;
    }

    const SPONSOR_STYLES = [
      { icon:'★', bg:'#fffbeb', border:'#fcd34d', iconBg:'#fde68a', iconColor:'#92400e', title:'#78350f' },

    function mergeMissingDefaults(){
      const missing = DEFAULT_D.filter(defaultDay=>!D.some(day=>day.id===defaultDay.id));
      if(!missing.length) return false;
      D.unshift(...missing.map(day=>JSON.parse(JSON.stringify(day))));

    function syncUid(){
      let maxId = uid;
      D.forEach(day=>{
        day.sessions?.forEach(sess=>{
          const sessId = parseInt(sess.id, 10);
          if(Number.isFinite(sessId)) maxId = Math.max(maxId, sessId);
          sess.items?.forEach(item=>{
            const itemId = parseInt(item.id, 10);
            if(Number.isFinite(itemId)) maxId = Math.max(maxId, itemId);
          });
        });
      });
      uid = maxId;
    }

    function ensureUniqueIds(){
      syncUid();
      const used = new Set();
      D.forEach(day=>{
        day.sessions?.forEach(sess=>{
          let sid = String(sess.id ?? '');
          if(!sid || used.has(`s:${sid}`)){
            sess.id = mkid();
            sid = String(sess.id);
          }
          used.add(`s:${sid}`);
          sess.items?.forEach(item=>{
            let iid = String(item.id ?? '');
            if(!iid || used.has(`i:${iid}`)){
              item.id = mkid();
              iid = String(item.id);
            }
            used.add(`i:${iid}`);
          });
        });
      });
    }

    function normalizeScheduleData(){

        day.sessions = day.sessions.map(sess=>{

          if(looksLikeBreak){
            return {
              id: sess.id || mkid(),
              label: sess.label || 'BRK',
              title: sess.title || 'Break / Sponsor',
              type: 'break',
              dur: parseInt(sess.dur) || 30,
              desc: sess.desc || '',
              _sponsorVariant: sess._sponsorVariant || 0
            };
          }

          const items = Array.isArray(sess.items) ? sess.items : [];
          return {
            id: sess.id || mkid(),
            label: sess.label || 'NEW',
            title: sess.title || 'New Session',
            type: 'session',
            items: items.map(item=>({
              id: item.id || mkid(),

              unc: item.type === 'speaker' ? !!item.unc : undefined,
              dur: parseInt(item.dur) || 20,

            wrapupDur: parseInt(sess.wrapupDur) || 10

    async function loadData() {
      const status = document.getElementById('sync-status');
      const binId = getBinId();

      if (!CONFIG.USE_CLOUD) {
        status.innerText = 'Memory Mode';
        status.style.color = '#94a3b8';
        return;
      }

      try {
        status.innerText = binId ? 'Loading...' : 'Ready to create cloud save';
        status.style.color = '#94a3b8';

        if (!binId) return;

        const res = await fetch(`${CONFIG.BIN_API_BASE}/${binId}/latest`, {
          headers: authHeaders(false)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        const data = json.record;
        if (Array.isArray(data)) {
          D.splice(0, D.length, ...data);
          normalizeScheduleData();
          mergeMissingDefaults();
          syncUid();
          status.innerText = 'Synced';
          status.style.color = '#15803d';
        }
      } catch (e) {
        console.error('jsonbin.io load failed', e);
        status.innerText = 'Load Error / 401';
        status.style.color = '#dc2626';
      }
    }

    async function saveData() {
      const status = document.getElementById('sync-status');
      if (!CONFIG.USE_CLOUD) return;

      try {
        status.innerText = 'Saving...';
        status.style.color = '#2563eb';
        let binId = getBinId();
        
        if (!binId) {
          const createRes = await fetch(CONFIG.BIN_API_BASE, {
            method: 'POST',
            headers: authHeaders(true), 
            body: JSON.stringify(D)
          });
          if (!createRes.ok) throw new Error(`HTTP ${createRes.status}`);
          const createData = await createRes.json();
          binId = createData?.metadata?.id || createData?.id || '';
          setBinId(binId);
        }

        const response = await fetch(`${CONFIG.BIN_API_BASE}/${binId}`, {
          method: 'PUT',
          headers: authHeaders(true), 
          body: JSON.stringify(D)
        });
        
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        status.innerText = 'Synced';
        status.style.color = '#15803d';
      } catch (e) {
        console.error('cloud save failed', e);
        status.innerText = 'Save Error / 401';
        status.style.color = '#dc2626';
      }
    }

              if(item.type==='speaker'){
                const badge=item.unc ?`<button type="button" class="status-toggle unc-badge" aria-label="Mark ${esc(item.name || 'speaker')} as confirmed" onclick="event.stopPropagation();toggleUnc('${item.id}',false)">unconfirmed</button>` :`<button type="button" class="status-toggle conf-badge" aria-label="Mark ${esc(item.name || 'speaker')} as unconfirmed" onclick="event.stopPropagation();toggleUnc('${item.id}',true)">confirmed</button>`;
                h+=`<div class="spk${draggingItem?' item-dragging':''}" data-itemid="${item.id}" draggable="true" ondragstart="itDragStart(event,'${item.id}','${sess.id}','${day.id}')" ondragend="itDragEnd()">
                  <span class="spk-handle">⠿</span>
                  <div class="av" id="av_${item.id}" style="background:${getColorHex(item.name && item.name !== 'New Speaker' ? colorFor(item.name) : (item._color || (item._color = getRandomColor())))}">${initials(item.name)}</div>
                  <div class="si">
                    <div class="sn"><span class="ed" contenteditable="true" onblur="setSpkName('${item.id}',this.innerText)">${esc(item.name)}</span><span>${badge}</span></div>
                    <div class="so-t"><span class="ed" contenteditable="true" onblur="setItemF('${item.id}','org',this.innerText)">${esc(item.org)}</span></div>
                    <div class="st-t"><span class="ed" contenteditable="true" onblur="setItemF('${item.id}','topic',this.innerText)">${esc(item.topic)}</span></div>
                  </div>
                  <div class="spk-right">
                    <div class="side-top">
                      <button type="button" class="btn-x" draggable="false" onmousedown="event.preventDefault();event.stopPropagation()" onclick="event.preventDefault();event.stopPropagation();removeItem('${item.id}','${sess.id}');return false;">✕</button>
                      <div class="dur-row"><span class="dur-val" onclick="openDur(this,null,'${item.id}')">${item.dur||20}</span><span class="dur-label">min</span></div>
                    </div>
                    <span class="spk-time">${iStart}</span>
                  </div></div>`;
              } else {
                h+=`<div class="open-slot${draggingItem?' item-dragging':''}" data-itemid="${item.id}" role="button" tabindex="0" aria-label="Activate open slot in ${esc(sess.title)}" draggable="true" ondragstart="itDragStart(event,'${item.id}','${sess.id}','${day.id}')" ondragend="itDragEnd()" onclick="activateSlot('${item.id}','${sess.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();activateSlot('${item.id}','${sess.id}')}">
                  <span class="spk-handle">⠿</span><span class="od"></span><span class="ol">Open slot — ${esc(sess.title)}</span>
                  <div class="open-right">
                    <div class="side-top">
                      <button type="button" class="btn-x" draggable="false" onmousedown="event.preventDefault();event.stopPropagation()" onclick="event.preventDefault();event.stopPropagation();removeItem('${item.id}','${sess.id}');return false;">✕</button>
                      <div class="dur-row"><span class="dur-val" onclick="event.stopPropagation();openDur(this,null,'${item.id}')">${item.dur||20}</span><span class="dur-label">min</span></div>
                    </div>
                    <span class="spk-time">${iStart}</span>
                  </div></div>`;
              }
            });
            h+=`<div class="item-drop-zone" ondragover="izOver(event,this,'${sess.id}')" ondragleave="izLeave(this)" ondrop="izDrop(event,'__end__','${sess.id}','${day.id}')"></div>`;
            
            const wrapDur = sess.wrapupDur || 10;
            h += `<div class="spk" style="background:var(--color-accent-soft); border-style:dashed; cursor:default;">
              <span class="spk-handle" style="opacity:0.2">⠿</span>
              <div class="av" style="background:var(--color-accent); color:white;">Q&A</div>
              <div class="si">
                <div class="sn">Wrap-up & Q/A</div>
                <div class="so-t">Session Conclusion</div>
              </div>
              <div class="spk-right">
                <div class="side-top">
                  <div class="dur-row"><span class="dur-val" onclick="openDur(this,'${sess.id}',null,true)">${wrapDur}</span><span class="dur-label">min</span></div>
                </div>
                <span class="spk-time">${iCur}</span>
              </div>
            </div>`;
            h+=`</div></div></div></div>`;
          }
        });
        h+=`<div class="sess-drop-zone" ondragover="szOver(event,this)" ondragleave="szLeave(this)" ondrop="szDrop(event,'__end__','${day.id}')"></div>`;
        h+=`</div><div class="add-dot-wrap"><div class="add-time">${dayEnd}</div><div class="add-controls"><div class="add-dot"></div><div class="add-btns">
          <button type="button" class="add-btn" onclick="addSession('${day.id}')">+ Session</button>
          <button type="button" class="add-btn" onclick="addBreak('${day.id}')">+ Break / Sponsor</button>
        </div></div></div></div>`;
        if(di<D.length-1)h+=`<hr>`;
      });
      app.innerHTML=h;
    }

    function cycleSponsorStyle(sessId){
      const s=findSess(sessId);if(!s||isBreakSession(s))return;
      s._sponsorVariant=((s._sponsorVariant||0)+1)%SPONSOR_STYLES.length;
      render();
    }

    function setDayStart(id,v){const d=findDay(id);if(d){d.startTime=v;render()}}
    function setSessLabel(id,v){const s=findSess(id);if(s){s.label=v.trim();scheduleSave()}}
    function setSessTitle(id,v){const s=findSess(id);if(s){s.title=v.trim();render()}}
    function setBreakF(id,f,v){const s=findSess(id);if(s){s[f]=v.trim();scheduleSave()}}
    function setItemF(id,f,v){const i=findItem(id);if(i){i[f]=v.trim();scheduleSave()}}
    function setSpkName(id,v){
      const item=findItem(id);if(!item)return;
      item.name=v.trim();
      const av=document.getElementById('av_'+id);
      if(av){
        const colorClass = colorFor(v.trim());
        av.style.background = getColorHex(colorClass);
        av.innerText = initials(v.trim());
        delete item._color;
      }
      scheduleSave();
    }
    function toggleUnc(id,checked){const i=findItem(id);if(i){i.unc=checked;render()}}
    function openDur(el,sessId,itemId,isWrapup=false){
      const cur=parseInt(el.innerText)||20;
      el.innerHTML='';
      const inp=document.createElement('input');
      inp.type='number';inp.min=5;inp.max=180;inp.step=5;inp.value=cur;
      inp.style.cssText='width:34px;font-size:12px;font-family:inherit;border:none;outline:none;background:transparent;color:var(--color-text-primary);text-align:right;-moz-appearance:textfield;appearance:textfield';
      el.appendChild(inp);
      requestAnimationFrame(()=>{inp.focus();inp.select()});
      const done=()=>{
        const v=Math.max(5,parseInt(inp.value)||20);
        if(itemId){const i=findItem(itemId);if(i)i.dur=v}
        else if(sessId){
          const s=findSess(sessId);
          if(s){
            if(isWrapup) s.wrapupDur=v;
            else s.dur=v;
          }
        }
        render();
      };
      inp.onblur=done;
      inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();done()}};
    }
    function activateSlot(itemId,sessId){
      const item=findItem(itemId);if(!item)return;
      Object.assign(item,{type:'speaker',name:'New Speaker',org:'Organisation',topic:'Topic',unc:true});
      render();
      setTimeout(()=>{
        const el=document.querySelector(`[data-itemid="${itemId}"] .sn .ed`);
        if(el){el.focus();const r=document.createRange();r.selectNodeContents(el);const sel=window.getSelection();sel.removeAllRanges();sel.addRange(r)}
      },60);
    }
    function addOpen(id){const s=findSess(id);if(!s||!s.items||s.items.length>=5)return;s.items.push({id:mkid(),type:'open',dur:20});render()}
    function addSession(dayId){const d=findDay(dayId);if(!d)return;d.sessions.push({id:mkid(),label:'NEW',title:'New Session',type:'session',items:[{id:mkid(),type:'open',dur:20},{id:mkid(),type:'open',dur:20}]});render()}
    function addBreak(dayId){const d=findDay(dayId);if(!d)return;d.sessions.push({id:mkid(),label:'BRK',title:'Break / Sponsor',type:'break',dur:30,desc:'Edit description'});render()}
    function addBreakAfter(sessId,dayId){
      const d=findDay(dayId);if(!d)return;
      const idx=d.sessions.findIndex(s=>String(s.id)===String(sessId));
      d.sessions.splice(idx+1,0,{id:mkid(),label:'BRK',title:'Break / Sponsor',type:'break',dur:30,desc:'Edit description'});render();
    }
    function removeSess(sessId,dayId){closeBurger();const d=findDay(dayId);if(!d)return;d.sessions=d.sessions.filter(s=>String(s.id)!==String(sessId));render()}
    function removeItem(itemId,sessId){
      const s=findSess(sessId);if(!s||!s.items)return;
      const idx=s.items.findIndex(i=>String(i.id)===String(itemId));if(idx===-1)return;
      const item=s.items[idx];
      if(item.type==='speaker')s.items[idx]={id:item.id,type:'open',dur:item.dur||20};
      else{if(s.items.length<=2)return;s.items.splice(idx,1)}
      render();
    }
    function toggleBurger(e,id){
      e.stopPropagation();
      const m=document.getElementById('bm_'+id);if(!m)return;
      const was=m.classList.contains('open');closeBurger();
      if(!was){m.classList.add('open');openBurger=id}
    }
    function closeBurger(){if(openBurger){const m=document.getElementById('bm_'+openBurger);if(m)m.classList.remove('open');openBurger=null}}

    function moveSession(beforeId,toDayId){
      if(!dragSess)return false;
      const fromDay=findDay(dragSess.dayId),toDay=findDay(toDayId);
      if(!fromDay||!toDay)return false;
      const fromIdx=fromDay.sessions.findIndex(s=>String(s.id)===dragSess.sessId);
      if(fromIdx===-1)return false;
      const sameSpot = dragSess.dayId===toDayId && String(beforeId)===String(dragSess.sessId);
      if(sameSpot)return false;
      const [moved]=fromDay.sessions.splice(fromIdx,1);
      if(beforeId==='__end__') toDay.sessions.push(moved);
      else {
        const ti=toDay.sessions.findIndex(s=>String(s.id)===String(beforeId));
        toDay.sessions.splice(ti>=0?ti:toDay.sessions.length,0,moved);
      }
      dragSess=null;
      render();
      return true;
    }

    async function exportSchedule(e){
      const btn = e.currentTarget;
      const originalText = btn.innerText;
      btn.innerText = 'Generating...';
      btn.disabled = true;
      const container = document.querySelector('.pg');
      const body = document.body;
      const originalBodyBg = body.style.backgroundColor;
      const originalContainerBg = container.style.backgroundColor;
      try {
        container.classList.add('export-mode');
        // Force absolute white and remove any blending
        body.style.setProperty('background-color', '#ffffff', 'important');
        container.style.setProperty('background-color', '#ffffff', 'important');
        
        await new Promise(r => setTimeout(r, 500)); // Give the browser more time to repaint
        
        const canvas = await html2canvas(container, {
          scale: 6, // Ultra-high resolution for extreme crispness
          backgroundColor: '#ffffff',
          logging: false,
          useCORS: false,
          windowWidth: container.scrollWidth,
          windowHeight: container.scrollHeight,
          imageTimeout: 0
        });
        const link = document.createElement('a');
        link.download = `MetConnex_2026_Schedule_${new Date().toISOString().split('T')[0]}.png`;
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
      } catch (err) {
        console.error('Export failed:', err);
        alert('Export failed. Please try again.');
      } finally {
        body.style.backgroundColor = originalBodyBg;
        container.style.backgroundColor = originalContainerBg;
        container.classList.remove('export-mode');
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }

    document.addEventListener('click',closeBurger);

    function ssDragStart(e,sessId,dayId){
      if(e.target.closest&&e.target.closest('.btn-x')){e.preventDefault();return}
      if(e.target.getAttribute&&e.target.getAttribute('contenteditable')==='true'){e.preventDefault();return}
      if(dragItem){e.preventDefault();return}
      dragSess={sessId:String(sessId),dayId};
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain','sess:'+sessId);
      e.stopPropagation();
      const row=(e.currentTarget.closest&&e.currentTarget.closest('.session-row'))||e.currentTarget;
      setTimeout(()=>row.classList.add('sess-dragging'),0);
    }
    function ssDragEnd(){
      document.querySelectorAll('.sess-dragging').forEach(el=>el.classList.remove('sess-dragging'));
      document.querySelectorAll('.sess-drop-zone.active').forEach(el=>el.classList.remove('active'));
      document.querySelectorAll('.card.drag-over').forEach(el=>el.classList.remove('drag-over'));
      dragSess=null;
    }
    function szOver(e,el){
      if(!dragSess)return;
      e.preventDefault();e.stopPropagation();
      document.querySelectorAll('.sess-drop-zone').forEach(z=>z.classList.remove('active'));
      el.classList.add('active');
    }
    function szLeave(el){el.classList.remove('active')}
    function szDrop(e,beforeId,toDayId){
      e.preventDefault();e.stopPropagation();
      document.querySelectorAll('.sess-drop-zone').forEach(z=>z.classList.remove('active'));
      moveSession(beforeId,toDayId);
    }
    function itDragStart(e,itemId,sessId,dayId){
      if(e.target.closest&&e.target.closest('.btn-x')){e.preventDefault();return}
      if(e.target.getAttribute&&e.target.getAttribute('contenteditable')==='true'){e.preventDefault();return}
      if(dragSess){e.preventDefault();return}
      dragItem={itemId:String(itemId),sessId:String(sessId),dayId};
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain','item:'+itemId);
      e.stopPropagation();
      const el=e.currentTarget;
      setTimeout(()=>el.classList.add('item-dragging'),0);
    }
    function itDragEnd(){
      document.querySelectorAll('.item-dragging').forEach(el=>el.classList.remove('item-dragging'));
      document.querySelectorAll('.item-drop-zone.active').forEach(el=>el.classList.remove('active'));
      document.querySelectorAll('.card.drag-over').forEach(el=>el.classList.remove('drag-over'));
      dragItem=null;render();
    }
    function izOver(e,el,toSessId){
      if(!dragItem)return;
      const toSess=findSess(toSessId);if(!toSess||!toSess.items)return;
      const spkCount=toSess.items.filter(i=>i.type==='speaker').length;
      if(spkCount>=5&&dragItem.sessId!==String(toSessId))return;
      e.preventDefault();e.stopPropagation();
      document.querySelectorAll('.item-drop-zone.active').forEach(z=>z.classList.remove('active'));
      el.classList.add('active');
    }
    function izLeave(el){el.classList.remove('active')}
    function izDrop(e,beforeId,toSessId,toDayId){
      e.preventDefault();e.stopPropagation();
      document.querySelectorAll('.item-drop-zone.active').forEach(z=>z.classList.remove('active'));
      if(!dragItem)return;
      const fromSess=findSess(dragItem.sessId),toSess=findSess(toSessId);
      if(!fromSess||!toSess)return;
      const spkCount=toSess.items.filter(i=>i.type==='speaker').length;
      if(spkCount>=5&&dragItem.sessId!==toSessId)return;
      const fromIdx=fromSess.items.findIndex(i=>String(i.id)===dragItem.itemId);
      if(fromIdx===-1)return;
      const[moved]=fromSess.items.splice(fromIdx,1);
      if(dragItem.sessId!==toSessId&&moved.type==='speaker'){
        fromSess.items.splice(fromIdx,0,{id:mkid(),type:'open',dur:moved.dur||20});
        const oi=toSess.items.findIndex(i=>i.type==='open');
        if(oi!==-1)toSess.items.splice(oi,1);
      }
      if(beforeId==='__end__')toSess.items.push(moved);
      else{const ti=toSess.items.findIndex(i=>String(i.id)===String(beforeId));toSess.items.splice(ti>=0?ti:toSess.items.length,0,moved)}
      dragItem=null;render();
    }
    function cardOver(e,sessId){
      if(!dragItem||dragItem.sessId===sessId)return;
      const s=findSess(sessId);if(!s)return;
      if(s.items.filter(i=>i.type==='speaker').length>=5)return;
      e.preventDefault();
      document.getElementById('card_'+sessId)?.classList.add('drag-over');
    }
    function cardLeave(sessId){document.getElementById('card_'+sessId)?.classList.remove('drag-over')}
    function cardDrop(e,sessId){document.getElementById('card_'+sessId)?.classList.remove('drag-over')}

    function sessCardOver(e,sessId){
      if(!dragSess||String(dragSess.sessId)===String(sessId))return;
      e.preventDefault();
      document.getElementById('card_'+sessId)?.classList.add('drag-over');
    }
    function sessCardLeave(sessId){
      document.getElementById('card_'+sessId)?.classList.remove('drag-over');
    }
    function sessCardDrop(e,sessId,dayId){
      if(!dragSess)return;
      e.preventDefault();
      e.stopPropagation();
      document.getElementById('card_'+sessId)?.classList.remove('drag-over');
      moveSession(sessId,dayId);
    }

    async function init() {
      renderSkeleton();
      await loadData();
      normalizeScheduleData();
      const hadMissingDefaults = mergeMissingDefaults();
      syncUid();
      isInitializing = false;
      await render();
      if (CONFIG.USE_CLOUD && (!getBinId() || hadMissingDefaults)) scheduleSave();
    }
    init();
  </script>
</body>
</html>
